<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Score Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Cell size: responsive between 28px and 48px */
      --cell: clamp(28px, 5.5vw, 48px);
      --radius: 6px;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #2c5f3a;
      min-height: 100vh;
      padding: 16px 10px 40px;
      color: #f0dfa0;
    }

    h1 {
      text-align: center;
      font-size: clamp(22px, 5vw, 36px);
      letter-spacing: 4px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.55);
      margin-bottom: 18px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Panels ────────────────────────────────────────────── */
    .panel {
      background: rgba(0,0,0,0.22);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,223,160,0.65);
      margin-bottom: 8px;
    }

    /* ── Encoding Input ────────────────────────────────────── */
    textarea {
      width: 100%;
      min-height: 64px;
      background: rgba(0,0,0,0.3);
      color: #f0dfa0;
      border: 1px solid rgba(240,223,160,0.22);
      border-radius: 4px;
      padding: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      line-height: 1.5;
    }
    textarea:focus { outline: 1px solid rgba(240,223,160,0.5); }
    textarea::placeholder { color: rgba(240,223,160,0.28); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 4px;
      font-family: Georgia, serif;
      font-size: 15px;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
      line-height: 1;
    }
    button:hover  { filter: brightness(1.12); }
    button:active { transform: scale(0.97); }

    .btn-primary   { background: #f0dfa0; color: #2c1810; font-weight: bold; }
    .btn-secondary { background: rgba(255,255,255,0.15); color: #f0dfa0; }

    .hint {
      font-size: 13px;
      font-style: italic;
      color: rgba(240,223,160,0.38);
      margin-top: 7px;
      line-height: 1.6;
    }
    .hint code {
      font-family: 'Courier New', monospace;
      color: rgba(240,223,160,0.55);
      font-style: normal;
    }

    .error-msg { font-size: 13px; color: #ff9b9b; margin-top: 6px; min-height: 20px; }

    /* ── Board ─────────────────────────────────────────────── */
    .board-scroll {
      overflow-x: auto;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }

    #board-grid {
      display: grid;
      /* label col + 15 cell cols */
      grid-template-columns: calc(var(--cell) * 0.72) repeat(15, var(--cell));
      /* label row + 15 cell rows */
      grid-template-rows: calc(var(--cell) * 0.62) repeat(15, var(--cell));
      gap: 1px;
      background: #163d22;
      border: 2px solid #163d22;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Labels */
    .lbl {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2c5f3a;
      color: rgba(240,223,160,0.5);
      font-size: clamp(9px, 1.5vw, 14px);
      font-weight: bold;
      font-family: Georgia, serif;
    }

    /* Cells */
    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #52a86a;
      user-select: none;
    }

    /* Bonus square colours */
    .cell.tw   { background: #bf2d1d; }
    .cell.dw   { background: #e8a0a0; }
    .cell.tl   { background: #2158c4; }
    .cell.dl   { background: #8ec4f0; }
    .cell.star { background: #e8a0a0; } /* center = DW + star */

    .bonus-txt {
      font-size: clamp(5px, calc(var(--cell) * 0.165), 9px);
      font-weight: 900;
      line-height: 1.2;
      text-align: center;
      pointer-events: none;
      letter-spacing: -0.3px;
    }
    .cell.tw   .bonus-txt { color: #fff; }
    .cell.dw   .bonus-txt { color: #7a0000; }
    .cell.tl   .bonus-txt { color: #fff; }
    .cell.dl   .bonus-txt { color: #00005a; }
    .cell.star .bonus-txt {
      color: #7a0000;
      font-size: clamp(8px, calc(var(--cell) * 0.4), 18px);
    }

    /* ── Tiles (on board) ──────────────────────────────────── */
    .tile {
      position: absolute;
      inset: 1px;
      background: #f5e6b0;
      border-radius: 2px;
      border: 1px solid #b8860b;
      box-shadow: inset -1px -1px 0 rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .tile.blank { background: #f0ead8; }

    .tile-l {
      font-size: clamp(12px, calc(var(--cell) * 0.43), 22px);
      font-weight: bold;
      color: #1a0e00;
      line-height: 1;
    }
    .tile.blank .tile-l { color: #999; }

    .tile-v {
      position: absolute;
      bottom: 1px;
      right: 2px;
      font-size: clamp(5px, calc(var(--cell) * 0.19), 10px);
      color: #5a3a10;
      line-height: 1;
    }

    /* ── Rack ──────────────────────────────────────────────── */
    .rack-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      background: #7a5c00;
      border: 3px solid #5a4000;
      border-radius: var(--radius);
      padding: 8px 10px;
      min-height: calc(var(--cell) + 24px);
    }

    .rack-tile {
      width: calc(var(--cell) + 6px);
      height: calc(var(--cell) + 6px);
      background: #f5e6b0;
      border: 2px solid #b8860b;
      box-shadow: 2px 2px 0 #5a4000;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: grab;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .rack-tile:hover {
      transform: translateY(-2px);
      box-shadow: 2px 4px 0 #5a4000;
    }
    .rack-tile:active { cursor: grabbing; }
    .rack-tile.blank { background: #f0ead8; }

    .rack-tile .tile-l {
      font-size: clamp(16px, calc(var(--cell) * 0.52), 26px);
      font-weight: bold;
      color: #1a0e00;
      line-height: 1;
    }
    .rack-tile.blank .tile-l { color: #999; }

    .rack-tile .tile-v {
      position: absolute;
      bottom: 2px;
      right: 3px;
      font-size: clamp(7px, calc(var(--cell) * 0.23), 12px);
      color: #5a3a10;
      line-height: 1;
    }

    .empty-hint {
      color: rgba(245,230,176,0.38);
      font-style: italic;
      font-size: 15px;
    }

    /* ── Score Preview ─────────────────────────────────────── */
    .score-placeholder {
      color: rgba(240,223,160,0.38);
      font-style: italic;
      font-size: 15px;
    }

    .score-words {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }

    .score-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 16px;
    }

    .score-word {
      font-weight: bold;
      letter-spacing: 1.5px;
      font-size: 17px;
      flex: 1;
    }

    .score-mult {
      background: rgba(240,223,160,0.18);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 13px;
      font-weight: bold;
      color: rgba(240,223,160,0.65);
      white-space: nowrap;
    }

    .score-pts {
      font-size: 17px;
      font-weight: bold;
      min-width: 32px;
      text-align: right;
    }

    .bingo-row .score-word,
    .bingo-row .score-pts { color: #f0c040; }

    .score-divider {
      border: none;
      border-top: 1px solid rgba(240,223,160,0.18);
      margin: 8px 0;
    }

    .score-total {
      text-align: right;
      font-size: 16px;
      color: rgba(240,223,160,0.7);
    }

    .score-total strong {
      font-size: 28px;
      color: #f0c040;
      margin-left: 8px;
    }

    /* ── Word highlight & valid state ──────────────────────── */
    .cell.in-word {
      box-shadow: inset 0 0 0 1.5px rgba(240, 223, 160, 0.38);
    }

    .player-tile.valid-play {
      border-color: #5ab05a;
      box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2), 0 0 0 1px rgba(90,176,90,0.4);
    }

    /* ── Tile placement animation ───────────────────────────── */
    @keyframes tilePlace {
      0%   { transform: scale(0.72); opacity: 0.5; }
      65%  { transform: scale(1.06); }
      100% { transform: scale(1);    opacity: 1;   }
    }

    .player-tile { animation: tilePlace 0.17s ease-out; }

    /* ── Collapsible encoding panel ─────────────────────────── */
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      margin-bottom: 8px;
      user-select: none;
    }
    .panel-header .panel-title { margin-bottom: 0; }

    .panel-chevron {
      font-size: 14px;
      color: rgba(240,223,160,0.4);
      transition: transform 0.2s;
      padding: 0 4px;
      line-height: 1;
    }
    .panel-header.collapsed .panel-chevron { transform: rotate(-90deg); }

    #enc-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      max-height: 400px;
      opacity: 1;
    }
    #enc-body.collapsed { max-height: 0; opacity: 0; }

    /* ── Rack count badge ───────────────────────────────────── */
    .rack-count {
      font-weight: normal;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: none;
      color: rgba(240,223,160,0.42);
      margin-left: 7px;
    }

    /* ── Drag & Drop ────────────────────────────────────────── */
    .cell.drop-target {
      box-shadow: inset 0 0 0 2px rgba(240,223,160,0.9);
    }
    .rack-bar.drop-target {
      outline: 2px dashed rgba(240,223,160,0.7);
      outline-offset: -3px;
    }
    .rack-tile.dragging,
    .player-tile.dragging { opacity: 0.3; }

    .player-tile {
      cursor: grab;
      z-index: 3;
    }
    .player-tile:active { cursor: grabbing; }
    .player-tile.blank  { background: #f0ead8; }

    .player-tile.invalid {
      background: #ffe4e4 !important;
      border-color: #c04040;
      box-shadow: inset 0 0 0 1px #c04040;
    }
    .player-tile.invalid .tile-l { color: #8b1a1a; }
    .player-tile.invalid .tile-v { color: #a03030; }

    .score-error {
      color: #ff9b9b;
      font-size: 15px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      line-height: 1.4;
    }
    .score-error-icon { font-size: 15px; flex-shrink: 0; }

    .touch-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.88;
      transform: translate(-50%, -50%) scale(1.1);
      width: calc(var(--cell) + 6px);
      height: calc(var(--cell) + 6px);
      background: #f5e6b0;
      border: 2px solid #b8860b;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.45);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .touch-ghost.blank { background: #f0ead8; }
    .touch-ghost .tile-l {
      font-size: clamp(16px, calc(var(--cell) * 0.52), 26px);
      font-weight: bold;
      color: #1a0e00;
      font-family: Georgia, serif;
      line-height: 1;
    }
    .touch-ghost.blank .tile-l { color: #999; }
    .touch-ghost .tile-v {
      position: absolute;
      bottom: 2px;
      right: 3px;
      font-size: clamp(6px, calc(var(--cell) * 0.23), 10px);
      color: #5a3a10;
      font-family: Georgia, serif;
      line-height: 1;
    }

    /* ── Focus & keyboard selection ─────────────────────────── */
    .rack-tile:focus-visible,
    .player-tile:focus-visible {
      outline: 3px solid #f0c040;
      outline-offset: 2px;
    }

    .rack-tile.kb-selected {
      outline: 3px solid #f0c040;
      outline-offset: 2px;
      transform: translateY(-3px);
      box-shadow: 2px 6px 0 #5a4000;
    }

    .player-tile.kb-selected {
      outline: 3px solid #f0c040;
      outline-offset: 2px;
    }

    .cell.kb-target {
      box-shadow: inset 0 0 0 2.5px #f0c040;
      cursor: pointer;
    }

    button:focus-visible {
      outline: 3px solid #f0c040;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>SCORE PLANNER</h1>

  <!-- Encoding Input -->
  <div class="panel">
    <div class="panel-header" id="enc-header" onclick="toggleEncoding()">
      <div class="panel-title">Board Encoding</div>
      <span class="panel-chevron">▾</span>
    </div>
    <div id="enc-body">
      <textarea id="enc"
        placeholder="BOARD: H@D-8, E@E-8, L@F-8, L@G-8, O@H-8&#10;RACK: AEINRST"></textarea>
      <div class="btn-row">
        <button class="btn-primary"   onclick="loadEncoding()">Load Board</button>
        <button class="btn-secondary" onclick="loadExample()">Example</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      <p class="hint">
        Format: <code>BOARD: A@A-1, b@B-2 &nbsp; RACK: ABCDE?G</code><br>
        Column A–O · Row 1–15 · lowercase letter on board = blank played as that letter · ? in rack = unused blank
      </p>
      <p class="error-msg" id="err"></p>
    </div>
  </div>

  <!-- Board -->
  <div class="board-scroll">
    <div id="board-grid"></div>
  </div>

  <!-- Rack -->
  <div class="panel">
    <div class="panel-title">Your Rack<span class="rack-count" id="rack-count"></span></div>
    <div class="rack-bar" id="rack">
      <span class="empty-hint">Load an encoding to see your tiles</span>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="recallAll()">Recall All</button>
    </div>
  </div>

  <!-- Score -->
  <div class="panel">
    <div class="panel-title">Score Preview</div>
    <div class="score-placeholder" id="score-display" aria-live="polite" aria-atomic="true">
      Place tiles on the board to calculate your turn score
    </div>
  </div>
</div>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────

const TILE_VALUES = {
  A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8,
  K:5, L:1, M:3, N:1, O:1, P:3, Q:10, R:1, S:1, T:1,
  U:1, V:4, W:4, X:8, Y:4, Z:10, '?':0
};

const COLS = 'ABCDEFGHIJKLMNO';

// Build bonus lookup: "r,c" → 'TW' | 'DW' | 'TL' | 'DL'
const BONUS_MAP = (() => {
  const m = new Map();
  const d = {
    TW: [[0,0],[0,7],[0,14],[7,0],[7,14],[14,0],[14,7],[14,14]],
    DW: [[1,1],[1,13],[2,2],[2,12],[3,3],[3,11],[4,4],[4,10],[7,7],
         [10,4],[10,10],[11,3],[11,11],[12,2],[12,12],[13,1],[13,13]],
    TL: [[1,5],[1,9],[5,1],[5,5],[5,9],[5,13],
         [9,1],[9,5],[9,9],[9,13],[13,5],[13,9]],
    DL: [[0,3],[0,11],[2,6],[2,8],[3,0],[3,7],[3,14],
         [6,2],[6,6],[6,8],[6,12],[7,3],[7,11],
         [8,2],[8,6],[8,8],[8,12],[11,0],[11,7],[11,14],
         [12,6],[12,8],[14,3],[14,11]]
  };
  for (const [type, coords] of Object.entries(d))
    for (const [r, c] of coords) m.set(`${r},${c}`, type);
  return m;
})();

const EXAMPLE_ENC = `BOARD: H@D-8, E@E-8, L@F-8, L@G-8, O@H-8, W@H-6, O@H-7, R@H-9, L@H-10, D@H-11
RACK: AEINRST`;

// ── State ────────────────────────────────────────────────────────────────────

// boardCells[r][c] = { letter, isBlank, isStatic } | null
const boardCells = Array.from({length: 15}, () => Array(15).fill(null));

// ── Utilities ────────────────────────────────────────────────────────────────

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text !== undefined) e.textContent = text;
  return e;
}

// ── Parsing ──────────────────────────────────────────────────────────────────

function parseEncoding(raw) {
  const errs = [];

  // Split on BOARD: and RACK: headers (case-insensitive)
  const boardMatch = raw.match(/BOARD\s*:\s*([\s\S]*?)(?=RACK\s*:|$)/i);
  const rackMatch  = raw.match(/RACK\s*:\s*([A-Za-z?]*)/i);

  const boardTiles = [];
  if (boardMatch?.[1]?.trim()) {
    for (const tok of boardMatch[1].split(',')) {
      const t = tok.trim();
      if (!t) continue;
      // Accept: LETTER@COL-ROW  e.g. H@D-8 or h@d-8
      const m = t.match(/^([A-Za-z])@([A-Oa-o])-(\d{1,2})$/);
      if (!m) { errs.push(`Invalid token: "${t}"`); continue; }
      const letter  = m[1];
      const col     = m[2].toUpperCase().charCodeAt(0) - 65; // 0–14
      const row     = parseInt(m[3], 10) - 1;                // 0–14
      if (row < 0 || row > 14) { errs.push(`Row out of range in "${t}"`); continue; }
      // Lowercase letter on board means blank played as that letter
      const isBlank = letter !== letter.toUpperCase();
      boardTiles.push({ letter: letter.toUpperCase(), col, row, isBlank });
    }
  }

  const rackTiles = [];
  if (rackMatch?.[1]) {
    for (const ch of rackMatch[1]) {
      const isBlank = ch === '?';
      const letter  = isBlank ? '?' : ch.toUpperCase();
      rackTiles.push({ letter, isBlank });
    }
  }

  return { boardTiles, rackTiles, errs };
}

// ── Board Rendering ───────────────────────────────────────────────────────────

function buildBoard() {
  const grid = document.getElementById('board-grid');
  grid.innerHTML = '';

  // ── Row 0: corner + column labels ──
  grid.appendChild(el('div', 'lbl')); // empty corner
  for (const ch of COLS) {
    grid.appendChild(el('div', 'lbl', ch));
  }

  // ── Rows 1–15: row label + 15 cells ──
  for (let r = 0; r < 15; r++) {
    grid.appendChild(el('div', 'lbl', String(r + 1)));

    for (let c = 0; c < 15; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      cell.dataset.r = r;
      cell.dataset.c = c;

      const isCenter = r === 7 && c === 7;
      const bonus    = BONUS_MAP.get(`${r},${c}`);

      if (isCenter) {
        cell.classList.add('star');
        cell.appendChild(el('span', 'bonus-txt', '★'));
      } else if (bonus) {
        cell.classList.add(bonus.toLowerCase());
        const labels = { TW: '3W', DW: '2W', TL: '3L', DL: '2L' };
        cell.appendChild(el('span', 'bonus-txt', labels[bonus]));
      }

      grid.appendChild(cell);
    }
  }
}

function placeTileOnCell(r, c, { letter, isBlank }) {
  const cell = document.getElementById(`cell-${r}-${c}`);
  if (!cell) return;

  // Hide bonus label so the tile covers it cleanly
  const bonusTxt = cell.querySelector('.bonus-txt');
  if (bonusTxt) bonusTxt.style.visibility = 'hidden';

  const tile = el('div', 'tile' + (isBlank ? ' blank' : ''));
  tile.appendChild(el('span', 'tile-l', letter));
  if (!isBlank) {
    const val = TILE_VALUES[letter] ?? 0;
    tile.appendChild(el('span', 'tile-v', String(val)));
  }

  cell.appendChild(tile);
  boardCells[r][c] = { letter, isBlank, isStatic: true };
}

// ── Rack helpers ─────────────────────────────────────────────────────────────

function createRackTileElement(tile) {
  const div = el('div', 'rack-tile' + (tile.isBlank ? ' blank' : ''));
  div.id = 'rack-tile-' + tile.id;
  div.dataset.tileId = tile.id;
  div.draggable = true;
  div.tabIndex = 0;
  div.setAttribute('role', 'button');
  div.setAttribute('aria-label', tile.isBlank ? 'Blank tile' : `Tile ${tile.letter}, ${TILE_VALUES[tile.letter] ?? 0} point${TILE_VALUES[tile.letter] === 1 ? '' : 's'}`);
  div.appendChild(el('span', 'tile-l', tile.letter));
  if (!tile.isBlank) div.appendChild(el('span', 'tile-v', String(TILE_VALUES[tile.letter] ?? 0)));
  div.addEventListener('dragstart', e => startDrag(e, tile.id, 'rack', null, div));
  div.addEventListener('dragend',   () => endDrag());
  div.addEventListener('touchstart', e => touchStart(e, tile.id, 'rack', null, div), { passive: false });
  div.addEventListener('click', () => {
    if (kbTileId === tile.id && !kbFromBoard) { kbClearSelection(); return; }
    kbSelectTile(tile.id, false);
  });
  div.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); div.click(); }
  });
  return div;
}

function createPlayerTileElement(tile, r, c) {
  const div = el('div', 'tile player-tile' + (tile.isBlank ? ' blank' : ''));
  div.dataset.tileId = tile.id;
  div.draggable = true;
  div.tabIndex = 0;
  div.setAttribute('role', 'button');
  div.setAttribute('aria-label', (tile.isBlank ? 'Blank tile' : `Tile ${tile.letter}`) + ' on board — click to move');
  div.appendChild(el('span', 'tile-l', tile.letter));
  if (!tile.isBlank) div.appendChild(el('span', 'tile-v', String(TILE_VALUES[tile.letter] ?? 0)));
  div.addEventListener('dragstart', e => { e.stopPropagation(); startDrag(e, tile.id, 'board', { r, c }, div); });
  div.addEventListener('dragend', () => endDrag());
  div.addEventListener('touchstart', e => { e.stopPropagation(); touchStart(e, tile.id, 'board', { r, c }, div); }, { passive: false });
  div.addEventListener('click', e => {
    e.stopPropagation();
    if (kbTileId === tile.id && kbFromBoard) { kbClearSelection(); return; }
    kbSelectTile(tile.id, true);
  });
  div.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); div.click(); }
    if (e.key === 'Escape') kbClearSelection();
  });
  return div;
}

// ── Rack Rendering ────────────────────────────────────────────────────────────

function renderRack(tiles) {
  rackTiles = tiles.map(t => ({
    id: nextTileId++, letter: t.letter, isBlank: t.isBlank,
    placed: false, boardR: null, boardC: null,
  }));
  const rack = document.getElementById('rack');
  rack.innerHTML = '';
  if (!rackTiles.length) {
    rack.appendChild(el('span', 'empty-hint', 'No rack tiles in encoding'));
    return;
  }
  for (const tile of rackTiles) rack.appendChild(createRackTileElement(tile));
}

// ── Drag state ───────────────────────────────────────────────────────────────

let rackTiles  = [];
let nextTileId = 0;

const drag = { active: false, tileId: null, sourceType: null, sourceCell: null, dragEl: null };
let touchGhost = null, touchDragActive = false;

// ── Keyboard selection state ──────────────────────────────────────────────────

let kbTileId = null;   // id of selected tile (rack or placed), null = none
let kbFromBoard = false; // true if the selected tile is already placed on the board

function kbSelectTile(tileId, fromBoard) {
  kbClearSelection();
  kbTileId = tileId;
  kbFromBoard = fromBoard;
  const srcEl = fromBoard
    ? document.querySelector(`[data-tile-id="${tileId}"].player-tile`)
    : document.getElementById('rack-tile-' + tileId);
  if (srcEl) srcEl.classList.add('kb-selected');
  // highlight empty cells as kb-target
  for (let r = 0; r < 15; r++)
    for (let c = 0; c < 15; c++)
      if (!boardCells[r][c])
        document.getElementById('cell-' + r + '-' + c)?.classList.add('kb-target');
}

function kbClearSelection() {
  if (kbTileId !== null) {
    document.getElementById('rack-tile-' + kbTileId)?.classList.remove('kb-selected');
    document.querySelector(`[data-tile-id="${kbTileId}"].player-tile`)?.classList.remove('kb-selected');
  }
  kbTileId = null; kbFromBoard = false;
  document.querySelectorAll('.cell.kb-target').forEach(el => el.classList.remove('kb-target'));
}

function kbPlaceAt(r, c) {
  if (kbTileId === null || boardCells[r][c]) return;
  if (kbFromBoard) {
    const tile = rackTiles.find(t => t.id === kbTileId);
    if (tile) movePlayerTile(kbTileId, tile.boardR, tile.boardC, r, c);
  } else {
    placePlayerTile(kbTileId, r, c);
  }
  kbClearSelection();
}

// ── Mouse drag ────────────────────────────────────────────────────────────────

function startDrag(e, tileId, sourceType, sourceCell, srcEl) {
  drag.active = true; drag.tileId = tileId; drag.sourceType = sourceType;
  drag.sourceCell = sourceCell; drag.dragEl = srcEl;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { if (drag.dragEl) drag.dragEl.classList.add('dragging'); }, 0);
}

function endDrag() {
  if (drag.dragEl) drag.dragEl.classList.remove('dragging');
  drag.active = false; drag.tileId = null; drag.sourceType = null;
  drag.sourceCell = null; drag.dragEl = null;
}

// ── Drop zones ────────────────────────────────────────────────────────────────

function setupDropZones() {
  for (let r = 0; r < 15; r++) {
    for (let c = 0; c < 15; c++) {
      const cellEl = document.getElementById('cell-' + r + '-' + c);
      cellEl.addEventListener('dragover', e => {
        if (!drag.active || boardCells[r][c]) return;
        if (drag.sourceType === 'board' && drag.sourceCell?.r === r && drag.sourceCell?.c === c) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        cellEl.classList.add('drop-target');
      });
      cellEl.addEventListener('dragleave', () => cellEl.classList.remove('drop-target'));
      cellEl.addEventListener('drop', e => {
        e.preventDefault(); cellEl.classList.remove('drop-target');
        if (!drag.active || boardCells[r][c]) return;
        if (drag.sourceType === 'rack') {
          placePlayerTile(drag.tileId, r, c);
        } else if (drag.sourceType === 'board') {
          if (drag.sourceCell?.r !== r || drag.sourceCell?.c !== c)
            movePlayerTile(drag.tileId, drag.sourceCell.r, drag.sourceCell.c, r, c);
        }
      });
      cellEl.addEventListener('click', () => {
        if (kbTileId !== null && !boardCells[r][c]) kbPlaceAt(r, c);
      });
      cellEl.addEventListener('keydown', e => {
        if ((e.key === 'Enter' || e.key === ' ') && kbTileId !== null && !boardCells[r][c]) {
          e.preventDefault(); kbPlaceAt(r, c);
        }
      });
    }
  }
  const rackEl = document.getElementById('rack');
  rackEl.addEventListener('dragover', e => {
    if (!drag.active || drag.sourceType !== 'board') return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    rackEl.classList.add('drop-target');
  });
  rackEl.addEventListener('dragleave', () => rackEl.classList.remove('drop-target'));
  rackEl.addEventListener('drop', e => {
    e.preventDefault(); rackEl.classList.remove('drop-target');
    if (drag.active && drag.sourceType === 'board') recallTile(drag.tileId);
  });
}

// ── Tile placement ────────────────────────────────────────────────────────────

function placePlayerTile(tileId, r, c) {
  const tile = rackTiles.find(t => t.id === tileId);
  if (!tile || tile.placed || boardCells[r][c]) return;
  tile.placed = true; tile.boardR = r; tile.boardC = c;
  boardCells[r][c] = { letter: tile.letter, isBlank: tile.isBlank, isStatic: false, tileId };
  document.getElementById('rack-tile-' + tileId)?.remove();
  const rack = document.getElementById('rack');
  if (!rackTiles.some(t => !t.placed) && !rack.querySelector('.empty-hint'))
    rack.appendChild(el('span', 'empty-hint', 'All tiles placed'));
  const cellEl = document.getElementById('cell-' + r + '-' + c);
  const bt = cellEl.querySelector('.bonus-txt');
  if (bt) bt.style.visibility = 'hidden';
  cellEl.appendChild(createPlayerTileElement(tile, r, c));
  updateScore();
  updateRackCount();
}

function movePlayerTile(tileId, fromR, fromC, toR, toC) {
  const tile = rackTiles.find(t => t.id === tileId);
  if (!tile || !tile.placed || boardCells[toR][toC]) return;
  const fromEl = document.getElementById('cell-' + fromR + '-' + fromC);
  fromEl.querySelector('.player-tile')?.remove();
  const fb = fromEl.querySelector('.bonus-txt'); if (fb) fb.style.visibility = '';
  boardCells[fromR][fromC] = null;
  tile.boardR = toR; tile.boardC = toC;
  boardCells[toR][toC] = { letter: tile.letter, isBlank: tile.isBlank, isStatic: false, tileId };
  const toEl = document.getElementById('cell-' + toR + '-' + toC);
  const tb = toEl.querySelector('.bonus-txt'); if (tb) tb.style.visibility = 'hidden';
  toEl.appendChild(createPlayerTileElement(tile, toR, toC));
  updateScore();
  updateRackCount();
}

function recallTile(tileId) {
  const tile = rackTiles.find(t => t.id === tileId);
  if (!tile || !tile.placed) return;
  const { boardR: r, boardC: c } = tile;
  const cellEl = document.getElementById('cell-' + r + '-' + c);
  cellEl.querySelector('.player-tile')?.remove();
  const bt = cellEl.querySelector('.bonus-txt'); if (bt) bt.style.visibility = '';
  boardCells[r][c] = null;
  tile.placed = false; tile.boardR = null; tile.boardC = null;
  const rack = document.getElementById('rack');
  rack.querySelector('.empty-hint')?.remove();
  rack.appendChild(createRackTileElement(tile));
  updateScore();
  updateRackCount();
}

function recallAll() {
  rackTiles.filter(t => t.placed).forEach(t => recallTile(t.id));
}

// ── Touch drag ────────────────────────────────────────────────────────────────

function touchStart(e, tileId, sourceType, sourceCell, srcEl) {
  e.preventDefault(); touchDragActive = true;
  drag.active = true; drag.tileId = tileId; drag.sourceType = sourceType;
  drag.sourceCell = sourceCell; drag.dragEl = srcEl;
  srcEl.classList.add('dragging');
  const touch = e.touches[0];
  const tile  = rackTiles.find(t => t.id === tileId);
  touchGhost = document.createElement('div');
  touchGhost.className = 'touch-ghost' + (tile.isBlank ? ' blank' : '');
  const ls = document.createElement('span'); ls.className = 'tile-l'; ls.textContent = tile.letter;
  touchGhost.appendChild(ls);
  if (!tile.isBlank) {
    const vs = document.createElement('span'); vs.className = 'tile-v';
    vs.textContent = String(TILE_VALUES[tile.letter] ?? 0); touchGhost.appendChild(vs);
  }
  document.body.appendChild(touchGhost);
  touchGhost.style.left = touch.clientX + 'px'; touchGhost.style.top = touch.clientY + 'px';
  document.addEventListener('touchmove',   onTouchMove,   { passive: false });
  document.addEventListener('touchend',    onTouchEnd,    { once: true });
  document.addEventListener('touchcancel', onTouchEnd,    { once: true });
}

function onTouchMove(e) {
  if (!touchDragActive) return; e.preventDefault();
  const t = e.touches[0];
  touchGhost.style.left = t.clientX + 'px'; touchGhost.style.top = t.clientY + 'px';
  touchGhost.style.display = 'none';
  const tgt = document.elementFromPoint(t.clientX, t.clientY);
  touchGhost.style.display = '';
  document.querySelectorAll('.drop-target').forEach(x => x.classList.remove('drop-target'));
  if (tgt) {
    const cell = tgt.closest('.cell');
    if (cell) {
      const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
      if (!boardCells[r][c] && !(drag.sourceType === 'board' && drag.sourceCell?.r === r && drag.sourceCell?.c === c))
        cell.classList.add('drop-target');
    }
    const re = tgt.closest('.rack-bar');
    if (re && drag.sourceType === 'board') re.classList.add('drop-target');
  }
}

function onTouchEnd(e) {
  document.removeEventListener('touchmove', onTouchMove);
  if (!touchDragActive) return; touchDragActive = false;
  if (drag.dragEl) drag.dragEl.classList.remove('dragging');
  const t = e.changedTouches[0];
  if (touchGhost) touchGhost.style.display = 'none';
  const tgt = document.elementFromPoint(t.clientX, t.clientY);
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
  document.querySelectorAll('.drop-target').forEach(x => x.classList.remove('drop-target'));
  if (tgt && drag.active) {
    const cell = tgt.closest('.cell');
    const re   = tgt.closest('.rack-bar');
    if (cell) {
      const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
      if (!boardCells[r][c]) {
        if (drag.sourceType === 'rack') placePlayerTile(drag.tileId, r, c);
        else if (drag.sourceType === 'board' && (drag.sourceCell?.r !== r || drag.sourceCell?.c !== c))
          movePlayerTile(drag.tileId, drag.sourceCell.r, drag.sourceCell.c, r, c);
      }
    } else if (re && drag.sourceType === 'board') recallTile(drag.tileId);
  }
  drag.active = false; drag.tileId = null; drag.sourceType = null; drag.sourceCell = null; drag.dragEl = null;
}

// ── Validation ────────────────────────────────────────────────────────────────

// Returns { valid: bool, error: string|null }
// newTiles is an array of { r, c } for all newly placed (non-static) tiles.
function validatePlacement(newTiles) {
  if (newTiles.length === 0) return { valid: true, error: null };

  const rows = new Set(newTiles.map(t => t.r));
  const cols = new Set(newTiles.map(t => t.c));
  const sameRow = rows.size === 1;
  const sameCol = cols.size === 1;

  // Multiple tiles must all share a row or all share a column
  if (newTiles.length > 1 && !sameRow && !sameCol) {
    return { valid: false, error: 'All tiles must be placed in the same row or column.' };
  }

  // No empty gaps between the outermost new tiles (existing tiles in between are fine)
  if (sameRow && newTiles.length > 1) {
    const row = [...rows][0];
    const cs  = newTiles.map(t => t.c).sort((a, b) => a - b);
    for (let c = cs[0]; c <= cs[cs.length - 1]; c++) {
      if (!boardCells[row][c]) {
        return { valid: false, error: 'Tiles cannot have empty gaps between them.' };
      }
    }
  }
  if (sameCol && newTiles.length > 1) {
    const col = [...cols][0];
    const rs  = newTiles.map(t => t.r).sort((a, b) => a - b);
    for (let r = rs[0]; r <= rs[rs.length - 1]; r++) {
      if (!boardCells[r][col]) {
        return { valid: false, error: 'Tiles cannot have empty gaps between them.' };
      }
    }
  }

  // Connectivity: must touch the existing board, or cover center on first play
  const hasStatic = boardCells.some(row => row.some(cell => cell?.isStatic));

  if (!hasStatic) {
    // First play: if more than one tile, must cover the center star (H8 = r7,c7)
    if (newTiles.length > 1 && !newTiles.some(t => t.r === 7 && t.c === 7)) {
      return { valid: false, error: 'First play must cover the center square (H8).' };
    }
    // Single tile on empty board: not yet an error — player may still be placing
  } else {
    // Subsequent plays: at least one new tile must be orthogonally adjacent to a static tile
    const connected = newTiles.some(({ r, c }) =>
      (r > 0  && boardCells[r - 1][c]?.isStatic) ||
      (r < 14 && boardCells[r + 1][c]?.isStatic) ||
      (c > 0  && boardCells[r][c - 1]?.isStatic) ||
      (c < 14 && boardCells[r][c + 1]?.isStatic)
    );
    if (!connected) {
      return { valid: false, error: 'Tiles must connect to letters already on the board.' };
    }
  }

  return { valid: true, error: null };
}

// ── Scoring ───────────────────────────────────────────────────────────────────

// Walk from (r,c) in direction (dr,dc) and return the full word that passes
// through this cell, or null if the word is < 2 tiles or has no new tiles.
function getWordAt(r, c, dr, dc) {
  // Step backward to find the start of the word
  let sr = r, sc = c;
  while (
    sr - dr >= 0 && sr - dr <= 14 &&
    sc - dc >= 0 && sc - dc <= 14 &&
    boardCells[sr - dr][sc - dc]
  ) { sr -= dr; sc -= dc; }

  // Collect tiles walking forward
  const tiles = [];
  let cr = sr, cc = sc;
  while (cr >= 0 && cr < 15 && cc >= 0 && cc < 15 && boardCells[cr][cc]) {
    tiles.push({ r: cr, c: cc, cell: boardCells[cr][cc] });
    cr += dr; cc += dc;
  }

  // Must be ≥ 2 tiles and contain at least one newly placed tile
  if (tiles.length < 2) return null;
  if (!tiles.some(t => !t.cell.isStatic)) return null;
  return tiles;
}

// Score a word. Bonus squares only apply to newly placed (non-static) tiles.
// Returns { score, wordMult, breakdown } where breakdown lists per-tile info.
function scoreWord(tiles) {
  let letterSum = 0;
  let wordMult  = 1;

  for (const { r, c, cell } of tiles) {
    const base = cell.isBlank ? 0 : (TILE_VALUES[cell.letter] ?? 0);

    if (cell.isStatic) {
      // Already-played tile: no bonus
      letterSum += base;
    } else {
      // Newly placed tile: apply bonus square
      const bonus = BONUS_MAP.get(`${r},${c}`);
      if      (bonus === 'DL') { letterSum += base * 2; }
      else if (bonus === 'TL') { letterSum += base * 3; }
      else if (bonus === 'DW') { letterSum += base; wordMult *= 2; }
      else if (bonus === 'TW') { letterSum += base; wordMult *= 3; }
      else                     { letterSum += base; }
    }
  }

  return { score: letterSum * wordMult, wordMult };
}

function updateScore() {
  const scoreEl = document.getElementById('score-display');

  // Collect newly placed tiles
  const newTiles = [];
  for (let r = 0; r < 15; r++)
    for (let c = 0; c < 15; c++)
      if (boardCells[r][c] && !boardCells[r][c].isStatic)
        newTiles.push({ r, c });

  // Clear all previous per-turn styling
  document.querySelectorAll('.player-tile.invalid, .player-tile.valid-play')
          .forEach(el => el.classList.remove('invalid', 'valid-play'));
  document.querySelectorAll('.cell.in-word')
          .forEach(el => el.classList.remove('in-word'));

  if (newTiles.length === 0) {
    scoreEl.className = 'score-placeholder';
    scoreEl.textContent = 'Place tiles on the board to calculate your turn score';
    return;
  }

  // ── Validate placement ──
  const { valid, error } = validatePlacement(newTiles);

  if (!valid) {
    document.querySelectorAll('.player-tile')
            .forEach(el => el.classList.add('invalid'));
    scoreEl.className = 'score-error';
    scoreEl.innerHTML =
      `<span class="score-error-icon">⚠</span><span>${error}</span>`;
    return;
  }

  // ── Find all unique words containing at least one new tile ──
  const seen  = new Set();
  const words = [];

  for (const { r, c } of newTiles) {
    const hw = getWordAt(r, c, 0, 1);
    if (hw) {
      const key = `h,${hw[0].r},${hw[0].c},${hw[hw.length - 1].c}`;
      if (!seen.has(key)) { seen.add(key); words.push(hw); }
    }
    const vw = getWordAt(r, c, 1, 0);
    if (vw) {
      const key = `v,${vw[0].r},${vw[0].c},${vw[vw.length - 1].r}`;
      if (!seen.has(key)) { seen.add(key); words.push(vw); }
    }
  }

  if (words.length === 0) {
    scoreEl.className = 'score-placeholder';
    scoreEl.textContent = 'Place tiles next to existing letters to form a word';
    return;
  }

  // Highlight all cells in every formed word and mark player tiles as valid
  for (const word of words) {
    for (const { r, c } of word) {
      document.getElementById(`cell-${r}-${c}`)?.classList.add('in-word');
    }
  }
  document.querySelectorAll('.player-tile')
          .forEach(el => el.classList.add('valid-play'));

  // ── Score each word ──
  let total = 0;
  const wordScores = words.map(word => {
    const { score, wordMult } = scoreWord(word);
    total += score;
    return { text: word.map(t => t.cell.letter).join(''), score, wordMult };
  });

  // Bingo: all 7 rack tiles placed this turn
  const bingo = rackTiles.length === 7 && rackTiles.every(t => t.placed);
  if (bingo) total += 50;

  // ── Render ──
  scoreEl.className = '';
  let html = '<div class="score-words">';
  for (const { text, score, wordMult } of wordScores) {
    const mult = wordMult > 1 ? `<span class="score-mult">×${wordMult}</span>` : '';
    html += `<div class="score-row">
      <span class="score-word">${text}</span>${mult}
      <span class="score-pts">${score}</span>
    </div>`;
  }
  if (bingo) {
    html += `<div class="score-row bingo-row">
      <span class="score-word">BINGO!</span>
      <span class="score-pts">+50</span>
    </div>`;
  }
  html += '</div><hr class="score-divider">';
  html += `<div class="score-total">Turn score: <strong>${total}</strong></div>`;
  scoreEl.innerHTML = html;
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function toggleEncoding(forceCollapse) {
  const body   = document.getElementById('enc-body');
  const header = document.getElementById('enc-header');
  const collapse = forceCollapse !== undefined
    ? forceCollapse
    : !body.classList.contains('collapsed');
  body.classList.toggle('collapsed', collapse);
  header.classList.toggle('collapsed', collapse);
}

function updateRackCount() {
  const el = document.getElementById('rack-count');
  if (!el) return;
  const total  = rackTiles.length;
  const placed = rackTiles.filter(t => t.placed).length;
  el.textContent = total > 0 ? `${placed} / ${total} placed` : '';
}

// ── Actions ───────────────────────────────────────────────────────────────────

function loadEncoding() {
  kbClearSelection();
  const raw   = document.getElementById('enc').value.trim();
  const errEl = document.getElementById('err');

  if (!raw) {
    errEl.textContent = 'Please enter an encoding first.';
    return;
  }

  const { boardTiles, rackTiles: rawRack, errs } = parseEncoding(raw);
  errEl.textContent = errs.length ? errs.join(' · ') : '';

  // Reset board state
  for (let r = 0; r < 15; r++)
    for (let c = 0; c < 15; c++)
      boardCells[r][c] = null;

  buildBoard();
  setupDropZones();

  for (const t of boardTiles) {
    placeTileOnCell(t.row, t.col, t);
  }

  renderRack(rawRack);
  updateRackCount();
  updateScore();

  // Collapse the encoding panel so the board gets more screen space
  setTimeout(() => toggleEncoding(true), 250);
}

function loadExample() {
  document.getElementById('enc').value = EXAMPLE_ENC;
  loadEncoding();
}

function clearAll() {
  kbClearSelection();
  document.getElementById('enc').value     = '';
  document.getElementById('err').textContent = '';
  rackTiles = [];

  for (let r = 0; r < 15; r++)
    for (let c = 0; c < 15; c++)
      boardCells[r][c] = null;

  buildBoard();
  document.getElementById('rack').innerHTML =
    '<span class="empty-hint">Load an encoding to see your tiles</span>';
  updateRackCount();
  updateScore();
  toggleEncoding(false); // re-expand encoding panel
}

// ── Init ──────────────────────────────────────────────────────────────────────

buildBoard();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') kbClearSelection();
});
</script>
